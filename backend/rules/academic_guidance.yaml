# --- COMPUTER SCIENCE (CS) RULES ---
- rule_id: CS_EXC
  name: cs_excellence
  description: Excellence advice for CS
  conditions:
    - field: program
      operator: eq
      value: "Computer Science"
    - field: cgpa
      operator: gte
      value: 3.7
  conclusion:
    category: improvement
    recommendation: "CS Excellence: Eligible for the AI Lab Research Assistantship and Fast-Track Dual Degree (BS/MS)."
    action_tags: [ai_lab, research]

- rule_id: CS_STB
  name: cs_stable
  description: Stable advice for CS
  conditions:
    - field: program
      operator: eq
      value: "Computer Science"
    - field: cgpa
      operator: gte
      value: 3.0
    - field: cgpa
      operator: lt
      value: 3.7
  conclusion:
    category: improvement
    recommendation: "CS Growth: Recommended to complete the AWS Cloud Practitioner certification and join the Open Source Club."
    action_tags: [cloud, oss]

- rule_id: CS_PRB
  name: cs_probation
  description: Probation advice for CS
  conditions:
    - field: program
      operator: eq
      value: "Computer Science"
    - field: cgpa
      operator: lt
      value: 3.0
    - field: cgpa
      operator: gte
      value: 2.0
  conclusion:
    category: improvement
    recommendation: "CS Recovery: Prioritize Data Structures and Algorithms. Attend the weekly 'Code Flow' peer-tutoring sessions."
    action_tags: [peer_tutoring, dsa]

- rule_id: CS_CRT
  name: cs_critical
  description: Critical advice for CS
  conditions:
    - field: program
      operator: eq
      value: "Computer Science"
    - field: cgpa
      operator: lt
      value: 2.0
  conclusion:
    category: risk
    risk_level: HIGH
    recommendation: "CS CRITICAL: Mandatory academic counselling. Suggest deferring advanced electives to focus on CORE math/coding."
    action_tags: [probation, counseling]

