# --- GENERAL IMPROVEMENT RULES (Fallback/Cross-program) ---
- rule_id: GEN_ATT
  name: low_attendance_fix
  description: Catch-all for low attendance
  conditions:
    - field: attendance_pct
      operator: lt
      value: 75.0
  conclusion:
    category: improvement
    recommendation: "Personal Strategy: Switch to 'Hybrid Attendance' mode and use the Online Lecture Vault for missed content."
    action_tags: [hybrid, lecture_vault]
